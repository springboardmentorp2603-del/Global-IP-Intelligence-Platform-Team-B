spring.application.name=ip-backend

# --- Supabase Database ---
# Using port 6543 (Transaction mode pooler) — required for Spring Boot on Supabase free tier.
# Session mode (5432) hits max-clients limit on startup DDL execution.
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST}:${SUPABASE_DB_PORT}/${SUPABASE_DB_NAME}?sslmode=require
spring.datasource.username=${SUPABASE_DB_USERNAME}
spring.datasource.password=${SUPABASE_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.data-source-properties.prepareThreshold=0
# --- JPA Settings ---
# ddl-auto=none: schema changes are applied manually via SQL (see supabase-migrations.sql).
# Do NOT use "update" with Supabase free tier — it holds a DDL connection at startup
# which exhausts the session-mode pool before the app finishes booting.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

server.port=8081

# --- Hikari ---
# Pool size kept at 2 — Supabase free tier transaction-mode pooler allows limited
# concurrent connections. 2 is safe and sufficient for local development.
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=60000
spring.datasource.hikari.keepalive-time=30000
# --- JWT ---
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry-ms=3600000
jwt.refresh-token-expiry-ms=604800000

# --- Google OAuth ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8081/login/oauth2/code/google

oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}

# --- Mail ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.frontend-url=${FRONTEND_URL:http://localhost:5173}
app.mail-from=${MAIL_FROM:ipintel7@gmail.com}

# --- Token Lifetime ---
auth.refresh-token-expiry-days=7
auth.remember-me-expiry-days=30
auth.password-reset-expiry-minutes=60

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# --- Lens.org API ---
ip.api.lens.base-url=https://api.lens.org
ip.api.lens.api-key=${LENS_API_KEY}
ip.api.connect-timeout=5000
ip.api.read-timeout=15000